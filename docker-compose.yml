

services:
  fastapi:
    build: .
    container_name: fastapi_container
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: always 


  nginx:
    image: nginx
    container_name: nginx_container
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
    restart: always

    depends_on:
      - fastapi    
