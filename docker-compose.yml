

services:
  fastapi:
    build: .
    container_name: fastapi_container
    env_file:
      - .env
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/'] 
      interval: 10s
      timeout: 5s
      retries: 5 
    ports:
      - "8000:8000"
    restart: always 


  nginx:
    image: nginx
    container_name: nginx_container
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
    restart: always

    depends_on:
      fastapi:
        condition: service_healthy    
